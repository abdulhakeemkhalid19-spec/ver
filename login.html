<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$VER — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">$VER</a>
    <div class="nav-actions">
      <a href="register.html" class="btn-nav">Create Account</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">$VER</div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Login to your $VER account to continue earning</p>

      <!-- ERROR / SUCCESS -->
      <div id="login-error" class="error-msg" style="display:none;"></div>
      <div id="login-success" class="success-msg" style="display:none;"></div>

      <!-- MAIN LOGIN SCREEN -->
      <div id="login-main">

        <!-- GOOGLE LOGIN -->
        <button class="btn-google" onclick="loginWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <!-- TWITTER LOGIN -->
        <button class="btn-twitter" onclick="loginWithTwitter()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Continue with Twitter/X
        </button>

        <div class="auth-divider">or login with email link</div>

        <!-- MAGIC LINK -->
        <div class="form-group">
          <label>Gmail Address</label>
          <input type="email" id="magic-email" placeholder="your@gmail.com"/>
        </div>
        <button class="btn-primary full-width" onclick="sendMagicLink()">
          <span id="magic-btn-text">Send Magic Link</span>
        </button>

      </div>

      <p class="auth-note">Don't have an account? <a href="register.html">Create one here</a></p>

    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>

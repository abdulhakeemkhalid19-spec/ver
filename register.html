<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>$VER — Create Account</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">$VER</a>
    <div class="nav-actions">
      <a href="login.html" class="btn-secondary" style="padding:8px 20px;font-size:0.88rem;">Login</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">$VER</div>
      <h2 class="auth-title">Create Your Account</h2>
      <p class="auth-sub">Join the $VER airdrop and start earning tokens today</p>

      <!-- ERROR / SUCCESS -->
      <div id="reg-error" class="error-msg" style="display:none;"></div>
      <div id="reg-success" class="success-msg" style="display:none;"></div>

      <!-- STEP 1: SOCIAL LOGIN -->
      <div id="step-1">
        <button class="btn-google" onclick="signUpWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <button class="btn-twitter" onclick="signUpWithTwitter()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Continue with Twitter/X
        </button>

        <div class="auth-divider">or fill in manually</div>

        <div class="form-group">
          <label>Gmail Address *</label>
          <input type="email" id="reg-email" placeholder="your@gmail.com"/>
        </div>
        <button class="btn-primary full-width" onclick="proceedToStep2()">
          Continue →
        </button>
      </div>

      <!-- STEP 2: EXTRA DETAILS -->
      <div id="step-2" style="display:none;">
        <div class="step-indicator">
          <span class="step done">1</span>
          <span class="step-line"></span>
          <span class="step active">2</span>
        </div>
        <h3 style="margin-bottom:20px; font-size:1.1rem;">Complete Your Profile</h3>

        <div class="form-group">
          <label>Username (editable)</label>
          <input type="text" id="reg-username" placeholder="Your display name"/>
        </div>
        <div class="form-group">
          <label>Telegram Username *</label>
          <input type="text" id="reg-telegram" placeholder="@yourusername"/>
        </div>
        <div class="form-group">
          <label>Twitter/X Username *</label>
          <input type="text" id="reg-twitter" placeholder="@yourusername"/>
        </div>
        <div class="form-group">
          <label>BEP-20 Wallet Address *</label>
          <input type="text" id="reg-wallet" placeholder="0x..."/>
          <small style="color:var(--text-muted);font-size:0.78rem;margin-top:6px;display:block;">Use Trust Wallet or MetaMask BEP-20 address</small>
        </div>

        <div class="form-group">
          <label>Referral Code (optional)</label>
          <input type="text" id="reg-referral" placeholder="e.g. A3K9PX"/>
        </div>

        <button class="btn-primary full-width" onclick="completeRegistration()">
          <span id="reg-btn-text">Create Account & Verify Email</span>
        </button>
        <button class="btn-back" onclick="goBackStep1()">← Back</button>
      </div>

      <p class="auth-note">Already have an account? <a href="login.html">Login here</a></p>

    </div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
